version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: medisync_db
    restart: always
    environment:
      POSTGRES_DB: medisync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${MEDYSYNC_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medisync_backend
    restart: always
    ports:
      - "${MEDYSYNC_BACKEND_PORT:-5000}:5000"
    depends_on:
      - db
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/medisync
      JWT_SECRET: super_secret_medisync_jwt_key_2026

volumes:
  postgres_data:
